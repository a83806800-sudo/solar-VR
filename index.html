<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
</head>
<body>
    <a-scene>   
        <a-assets>
            <img id="sun" src="sun.jpg" crossorigin="anonymous">
            <img id="mercury" src="mercury.jpg" crossorigin="anonymous">
            <img id="venus" src="venus.jpg" crossorigin="anonymous">
            <img id="earth" src="earth.jpg" crossorigin="anonymous">
            <img id="sky" src="space.jpg" crossorigin="anonymous">
            <img id="mars" src="mars.jpg" crossorigin="anonymous">
            <img id="jupiter" src="jupiter.jpg" crossorigin="anonymous">
            <img id="saturn" src="saturn.jpg" crossorigin="anonymous">
            <img id="uranus" src="uranus.jpg" crossorigin="anonymous">
            <img id="neptune" src="neptune.jpg" crossorigin="anonymous">
            
        </a-assets>

        <a-sphere position="1 1 -4" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear"  radius="2" material="src:#sun; shader: flat;"></a-sphere>
        
        <a-torus position="1 1 -4" rotation="90 0 0" radius="6.5" radius-tubular="0.01" color="white" opacity="0.3"></a-torus>
        
        <a-torus position="1 1 -4" rotation="90 0 0" radius="3" radius-tubular="0.01" color="white" opacity="0.3"></a-torus>
        <a-torus position="1 1 -4" rotation="90 0 0" radius="4.5" radius-tubular="0.01" color="white" opacity="0.3"></a-torus>
        <a-torus position="1 1 -4" rotation="90 0 0" radius="8.9" radius-tubular="0.01" color="white" opacity="0.3"></a-torus>
        <a-torus position="1 1 -4" rotation="90 0 0" radius="12.9" radius-tubular="0.01" color="white" opacity="0.3"></a-torus>
        <a-torus position="1 1 -4" rotation="90 0 0" radius="16.9" radius-tubular="0.01" color="white" opacity="0.3"></a-torus>
        <a-torus position="1 1 -4" rotation="90 0 0" radius="21" radius-tubular="0.01" color="white" opacity="0.3"></a-torus>
        <a-torus position="1 1 -4" rotation="90 0 0" radius="24.4" radius-tubular="0.01" color="white" opacity="0.3"></a-torus>
        
        <a-entity position="1 1 -4" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
            <a-sphere position="3 0 0" radius=".3" material="src:#mercury;"></a-sphere>
        </a-entity>

        <a-entity position="1 1 -4" animation="property: rotation; to: 0 360 0; loop: true; dur: 7000; easing: linear">
            <a-sphere position="4.5 0 0" radius=".4" material="src:#venus;"></a-sphere>
        </a-entity>

        <a-entity position="1 1 -4" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
            <a-sphere position="6.5 0 0" radius=".6" material="src:#earth;"></a-sphere>
        </a-entity>

        <a-entity position="1 1 -4" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
            <a-sphere position="9 0 0" radius=".4" material="src:#mars;"></a-sphere>
        </a-entity>

        <a-entity position="1 1 -4" animation="property: rotation; to: 0 360 0; loop: true; dur: 25000; easing: linear">
            <a-sphere position="13 0 0" radius="1.2" material="src:#jupiter;"></a-sphere>
        </a-entity>

        <a-entity position="1 1 -4" animation="property: rotation; to: 0 360 0; loop: true; dur: 35000; easing: linear">
            <a-sphere position="17 0 0" radius="1" material="src:#saturn;">
                <a-torus rotation="90 0 0" 
                  radius="1.8" 
                  radius-tubular=".06" 
                  material="src:#saturn; side: double; opacity: 0.8;">
                </a-torus>
            </a-sphere>
            
        </a-entity>

        <a-entity position="1 1 -4" animation="property: rotation; to: 0 360 0; loop: true; dur: 45000; easing: linear">
            <a-sphere position="21 0 0" radius=".8" material="src:#uranus;"></a-sphere>
        </a-entity>

        <a-entity position="1 1 -4" animation="property: rotation; to: 0 360 0; loop: true; dur: 60000; easing: linear">
            <a-sphere position="25 0 0" radius=".8" material="src:#neptune;"></a-sphere>
        </a-entity>

        <a-sky src="#sky"></a-sky>
    </a-scene>
</body>
</html>
